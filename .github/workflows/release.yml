name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Determine version
        id: version
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          VERSION="${TAG#v}"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Build skill ZIP
        run: |
          SKILL_NAME="$(basename "$GITHUB_REPOSITORY")"
          VERSION="${{ steps.version.outputs.version }}"
          ZIP_NAME="${SKILL_NAME}-${VERSION}.zip"
          STAGE_DIR="$RUNNER_TEMP/stage/${SKILL_NAME}"

          mkdir -p "$STAGE_DIR"
          rsync -a \
            --exclude='.git' \
            --exclude='.github' \
            --exclude='.gitignore' \
            --exclude='_scratch' \
            --exclude='_comprehension' \
            --exclude='_retrospective_archive' \
            --exclude='.DS_Store' \
            --exclude='__pycache__' \
            --exclude='*.pyc' \
            --exclude='dist' \
            --exclude='*.zip' \
            ./ "$STAGE_DIR/"

          (cd "$RUNNER_TEMP/stage" && zip -r "$GITHUB_WORKSPACE/$ZIP_NAME" "$SKILL_NAME")
          echo "ZIP_NAME=$ZIP_NAME" >> "$GITHUB_ENV"

      - name: Extract release notes from CHANGELOG
        id: notes
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          NOTES_FILE="$RUNNER_TEMP/release-notes.md"

          if [ -f CHANGELOG.md ]; then
            awk -v ver="$VERSION" '
              $0 ~ "^## \\[" ver "\\]" { capture = 1; next }
              capture && /^## \[/ { exit }
              capture { print }
            ' CHANGELOG.md > "$NOTES_FILE"
          fi

          if [ ! -s "$NOTES_FILE" ]; then
            echo "Release v$VERSION" > "$NOTES_FILE"
          fi

          echo "notes_file=$NOTES_FILE" >> "$GITHUB_OUTPUT"

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: ${{ steps.version.outputs.tag }}
          body_path: ${{ steps.notes.outputs.notes_file }}
          files: ${{ env.ZIP_NAME }}
